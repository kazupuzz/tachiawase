<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>図形パズルゲーム（判定ロジック復元・フィードバック付）</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <style>
        body {
            font-family: 'Inter', 'Noto Sans JP', sans-serif;
            touch-action: none; 
            overflow: hidden; 
            user-select: none; 
        }
        canvas {
            display: block;
            margin: auto;
        }
        #gameCanvas {
            cursor: pointer;
            border-radius: 0.5rem;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
        }
        
        @keyframes pop-in {
            0% { transform: scale(0.8); opacity: 0; }
            80% { transform: scale(1.05); opacity: 1; }
            100% { transform: scale(1); opacity: 1; }
        }
        @keyframes text-shine {
            0% { background-position: -200% center; }
            100% { background-position: 200% center; }
        }

        .message-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(255, 255, 255, 0.85);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 0.5rem;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s ease-in-out;
            z-index: 40;
        }
        .message-overlay.show {
            display: flex;
            opacity: 1;
            pointer-events: all;
            animation: pop-in 0.4s ease-out;
        }
        #message-text {
            font-size: 3rem;
            font-weight: 800;
            background: linear-gradient(to right, #4F46E5, #10B981, #F59E0B, #4F46E5);
            background-size: 200% auto;
            color: transparent;
            background-clip: text;
            -webkit-background-clip: text;
            animation: text-shine 2s linear infinite;
        }
        
/* 修正前：z-index: 10; */
#resetButton {
    position: absolute;
    top: 0.75rem;
    right: 0.75rem;
    z-index: 50; /* メッセージ(40)より上に設定 */
}

        #editor-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: rgba(241, 245, 249, 0.95);
            z-index: 50;
            display: none;
            flex-direction: column;
            padding: 1rem;
            overflow-y: auto;
            touch-action: pan-y;
        }
        #editor-overlay.active {
            display: flex;
        }
        .problem-card {
            touch-action: none;
            cursor: grab;
            transition: transform 0.1s, box-shadow 0.1s;
        }
        .problem-card:active {
            cursor: grabbing;
            transform: scale(1.02);
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
            z-index: 10;
        }
        .sortable-ghost {
            opacity: 0.4;
            background-color: #e2e8f0;
            border: 2px dashed #94a3b8;
        }
    </style>
</head>

        let gameState = { problemId: 0, phase: 'cut', polygons: [] };

        // 編集モード
        let sortableInstance = null;
        editOrderButton.onclick = () => {
            renderEditorList();
            editorOverlay.classList.add('active');
            if (sortableInstance) sortableInstance.destroy();
            sortableInstance = new Sortable(sortableListEl, { animation: 150, ghostClass: 'sortable-ghost', delay: 100 });
        };
        cancelEditButton.onclick = () => editorOverlay.classList.remove('active');
        saveEditButton.onclick = () => {
            const newOrderIndices = Array.from(sortableListEl.children).map(el => parseInt(el.dataset.index));
            const currentProblem = problems[gameState.problemId];
            problems = newOrderIndices.map(index => problems[index]);
            gameState.problemId = problems.indexOf(currentProblem);
            setupProblemSelect();
            init(gameState.problemId);
            editorOverlay.classList.remove('active');
        };

        // ダウンロード
        downloadImagesButton.onclick = async () => {
            downloadImagesButton.disabled = true;
            const zip = new JSZip();
            const promises = problems.map((p, i) => new Promise(r => {
                const c = document.createElement('canvas'); c.width = 400; c.height = 400;
                drawThumbnail(c, p.vertices, p.targetShape, true);
                c.toBlob(b => { zip.file(`problem_${i+1}_${p.title}.png`, b); r(); });
            }));
            await Promise.all(promises);
            saveAs(await zip.generateAsync({type: "blob"}), "tachiawase.zip");
            downloadImagesButton.disabled = false;
        };

        function renderEditorList() {
            sortableListEl.innerHTML = '';
            problems.forEach((p, i) => {
                const card = document.createElement('div');
                card.className = 'problem-card bg-white p-2 rounded-lg shadow border border-slate-200 flex flex-col items-center justify-between h-44 relative';
                card.dataset.index = i;
                const tc = document.createElement('canvas'); tc.width = 120; tc.height = 120;
                drawThumbnail(tc, p.vertices, p.targetShape);
                card.innerHTML = `<div class="text-xs font-bold text-slate-700 w-full truncate text-center">${p.title}</div>${p.isCleared ? '<span class="absolute top-1 right-1 text-yellow-500">★</span>' : ''}`;
                card.insertBefore(tc, card.firstChild);
                sortableListEl.appendChild(card);
            });
        }

        function drawThumbnail(canvas, vertices, targetShape, isDownload = false) {
            const ctx = canvas.getContext('2d');
            if (isDownload) { ctx.fillStyle = "#fff"; ctx.fillRect(0,0,canvas.width,canvas.height); }
            else ctx.clearRect(0,0,canvas.width,canvas.height);
            if (!vertices.length) return;
            
            let minX = Math.min(...vertices.map(v=>v.x)), maxX = Math.max(...vertices.map(v=>v.x));
            let minY = Math.min(...vertices.map(v=>v.y)), maxY = Math.max(...vertices.map(v=>v.y));
            const scale = Math.min(canvas.width/(maxX-minX||1), canvas.height/(maxY-minY||1)) * 0.7;
            const ox = (canvas.width - (maxX-minX)*scale)/2 - minX*scale, oy = (canvas.height - (maxY-minY)*scale)/2 - minY*scale;

            ctx.fillStyle = '#818cf8'; ctx.beginPath();
            ctx.moveTo(vertices[0].x*scale+ox, vertices[0].y*scale+oy);
            vertices.forEach(v => ctx.lineTo(v.x*scale+ox, v.y*scale+oy));
            ctx.closePath(); ctx.fill();
            ctx.strokeStyle = '#312e81'; ctx.lineWidth = isDownload?3:2; ctx.stroke();

            vertices.forEach(v => {
                ctx.fillStyle = '#ef4444'; ctx.beginPath();
                ctx.arc(v.x*scale+ox, v.y*scale+oy, isDownload?7.5:4.5, 0, Math.PI*2);
                ctx.fill(); ctx.strokeStyle = '#fff'; ctx.lineWidth = isDownload?2:1.5; ctx.stroke();
            });

            if (targetShape) {
                const isize = canvas.width * 0.22;
                ctx.fillStyle = 'rgba(255,255,255,0.9)'; ctx.beginPath(); ctx.arc(10+isize/2, 10+isize/2, isize/2+2, 0, 7); ctx.fill();
                if (targetShape==='三角形') {
                    ctx.fillStyle = '#6366f1'; ctx.beginPath(); ctx.moveTo(10+isize/2, 14); ctx.lineTo(6+isize, 6+isize); ctx.lineTo(14, 6+isize); ctx.fill();
                } else {
                    ctx.fillStyle = '#10b981'; ctx.fillRect(15, 15, isize-10, isize-10);
                }
            }
        }

        // ゲーム初期化
        function init(id = 0) {
            messageEl.classList.remove('show');
            updateFeedback("パズルをあわせてみよう");
            const p = problems[id];
            targetDisplayEl.textContent = `もくひょう： ${(p.targetShape === '三角形') ? 'さんかく' : 'しかく'}`;
            gameState = {
                problemId: id, phase: 'cut', targetShape: p.targetShape, targetVertexCount: p.targetVertexCount,
                polygons: [{ vertices: p.vertices.map(v=>({...v})), color: `hsla(${Math.random()*360},70%,60%,0.8)` }],
                selectedVertices: [], hoveredVertex: null, draggedPolygon: null, dragOffset: {x:0,y:0}
            };
            setupProblemSelect();
            problemSelectEl.value = id;
            resizeCanvas();
            requestAnimationFrame(gameLoop);
        }

        function resizeCanvas() {
            canvas.width = Math.min(gameContainerEl.clientWidth, 600);
            canvas.height = canvas.width * 0.75;
            messageEl.style.width = canvas.width + 'px'; messageEl.style.height = canvas.height + 'px';
        }

        function gameLoop() { draw(); if (gameState.phase !== 'cleared') requestAnimationFrame(gameLoop); }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = '#e2e8f0'; ctx.lineWidth = 1;
            for(let i=0;i<=canvas.width;i+=GRID_SIZE){ctx.beginPath();ctx.moveTo(i,0);ctx.lineTo(i,canvas.height);ctx.stroke();}
            for(let i=0;i<=canvas.height;i+=GRID_SIZE){ctx.beginPath();ctx.moveTo(0,i);ctx.lineTo(canvas.width,i);ctx.stroke();}
            gameState.polygons.forEach(p => {
                ctx.fillStyle = p.color; ctx.strokeStyle = '#1e293b'; ctx.lineWidth = 2; ctx.beginPath();
                ctx.moveTo(p.vertices[0].x*GRID_SIZE, p.vertices[0].y*GRID_SIZE);
                p.vertices.forEach(v => ctx.lineTo(v.x*GRID_SIZE, v.y*GRID_SIZE));
                ctx.closePath(); ctx.fill(); ctx.stroke();
            });
            if (gameState.phase === 'cut') {
                gameState.polygons[0].vertices.forEach(v => {
                    ctx.fillStyle = 'rgba(59,130,246,0.4)'; ctx.beginPath(); ctx.arc(v.x*GRID_SIZE, v.y*GRID_SIZE, VERTEX_RADIUS, 0, 7); ctx.fill();
                });
                gameState.selectedVertices.forEach(v => {
                    ctx.fillStyle = '#ef4444'; ctx.beginPath(); ctx.arc(v.vertex.x*GRID_SIZE, v.vertex.y*GRID_SIZE, VERTEX_RADIUS, 0, 7); ctx.fill();
                });
            }
        }

        function getMousePos(e) {
            const r = canvas.getBoundingClientRect();
            const cx = e.clientX ?? e.changedTouches?.[0]?.clientX;
            const cy = e.clientY ?? e.changedTouches?.[0]?.clientY;
            return { x: cx - r.left, y: cy - r.top };
        }

        canvas.onmousedown = canvas.ontouchstart = (e) => {
            if (e.type==='touchstart') e.preventDefault();
            if (gameState.phase==='cleared') return;
            const m = getMousePos(e);
            if (gameState.phase==='cut') {
                const vIdx = gameState.polygons[0].vertices.findIndex(v => Math.hypot(v.x*GRID_SIZE-m.x, v.y*GRID_SIZE-m.y) < CLICK_RADIUS);
                if (vIdx !== -1) {
                    const v = gameState.polygons[0].vertices[vIdx];
                    if (!gameState.selectedVertices.some(sv=>sv.idx===vIdx)) {
                        gameState.selectedVertices.push({idx:vIdx, vertex:v});
                        if (gameState.selectedVertices.length===2) {
                            if (isValidCut(gameState.selectedVertices[0], gameState.selectedVertices[1])) splitPolygon();
                            else { updateFeedback("そこでは切れません", true); gameState.selectedVertices = []; }
                        }
                    }
                }
            } else {
                const p = gameState.polygons.find(poly => {
                    ctx.beginPath(); ctx.moveTo(poly.vertices[0].x*GRID_SIZE, poly.vertices[0].y*GRID_SIZE);
                    poly.vertices.forEach(v => ctx.lineTo(v.x*GRID_SIZE, v.y*GRID_SIZE));
                    return ctx.isPointInPath(m.x, m.y);
                });
                if (p) { gameState.draggedPolygon = p; gameState.dragOffset = m; p.origVertices = p.vertices.map(v=>({...v})); }
            }
        };

        canvas.onmousemove = canvas.ontouchmove = (e) => {
            if (gameState.draggedPolygon) {
                const m = getMousePos(e);
                const dx = (m.x-gameState.dragOffset.x)/GRID_SIZE, dy = (m.y-gameState.dragOffset.y)/GRID_SIZE;
                gameState.draggedPolygon.vertices = gameState.draggedPolygon.origVertices.map(v=>({x:v.x+dx, y:v.y+dy}));
            }
        };

        canvas.onmouseup = canvas.ontouchend = (e) => {
            if (gameState.draggedPolygon) {
                gameState.draggedPolygon.vertices.forEach(v => { v.x = Math.round(v.x); v.y = Math.round(v.y); });
                gameState.draggedPolygon = null;
                checkWinCondition();
            }
        };

        function isValidCut(v1, v2) {
            const p = gameState.polygons[0].vertices;
            if (Math.abs(v1.idx-v2.idx)===1 || Math.abs(v1.idx-v2.idx)===p.length-1) return false;
            const mid = { x: (v1.vertex.x+v2.vertex.x)/2, y: (v1.vertex.y+v2.vertex.y)/2 };
            ctx.beginPath(); ctx.moveTo(p[0].x*GRID_SIZE, p[0].y*GRID_SIZE);
            p.forEach(v => ctx.lineTo(v.x*GRID_SIZE, v.y*GRID_SIZE));
            return ctx.isPointInPath(mid.x*GRID_SIZE, mid.y*GRID_SIZE);
        }

        function splitPolygon() {
            const p = gameState.polygons[0].vertices;
            let [i1, i2] = [gameState.selectedVertices[0].idx, gameState.selectedVertices[1].idx].sort((a,b)=>a-b);
            const n1 = p.slice(i1, i2+1), n2 = [...p.slice(i2), ...p.slice(0, i1+1)];
            gameState.polygons = [ {vertices:n1, color:gameState.polygons[0].color}, {vertices:n2, color:`hsla(${Math.random()*360},70%,60%,0.8)`} ];
            gameState.phase = 'combine'; gameState.selectedVertices = [];
            updateFeedback("図形をあわせてみよう");
        }

        // --- 判定ロジック群（復元） ---

        function gcd(a, b) { return b === 0 ? a : gcd(b, a % b); }

        function getUnitEdges(vertices) {
            const set = new Set();
            for (let i = 0; i < vertices.length; i++) {
                const a = vertices[i], b = vertices[(i + 1) % vertices.length];
                const dx = Math.round(b.x - a.x), dy = Math.round(b.y - a.y);
                const common = gcd(Math.abs(dx), Math.abs(dy));
                const ux = dx / common, uy = dy / common;
                for (let j = 0; j < common; j++) {
                    const x1 = Math.round(a.x + j * ux), y1 = Math.round(a.y + j * uy);
                    const x2 = Math.round(a.x + (j + 1) * ux), y2 = Math.round(a.y + (j + 1) * uy);
                    set.add(`${x1},${y1},${x2},${y2}`);
                }
            }
            return set;
        }

        function getReversedEdges(set) {
            const r = new Set();
            for (const e of set) { const [x1, y1, x2, y2] = e.split(','); r.add(`${x2},${y2},${x1},${y1}`); }
            return r;
        }

        function setIntersection(a, b) { const r = new Set(); for (const e of b) if (a.has(e)) r.add(e); return r; }

        function checkOverlap(p1, p2) {
            // レイキャスティングによる判定（境界上は「外」とする）
            const isInsideStrictly = (p, vs) => {
                let inside = false;
                for (let i = 0, j = vs.length - 1; i < vs.length; j = i++) {
                    const xi = vs[i].x, yi = vs[i].y, xj = vs[j].x, yj = vs[j].y;
                    const intersect = ((yi > p.y) !== (yj > p.y)) && (p.x < (xj - xi) * (p.y - yi) / (yj - yi + 0.000001) + xi);
                    if (intersect) inside = !inside;
                }
                if (!inside) return false;
                // 境界上チェック
                for (let i = 0, j = vs.length - 1; i < vs.length; j = i++) {
                    const a = vs[i], b = vs[j];
                    const cross = (p.y - a.y) * (b.x - a.x) - (p.x - a.x) * (b.y - a.y);
                    if (Math.abs(cross) < 0.001) {
                        const dot = (p.x - a.x) * (b.x - a.x) + (p.y - a.y) * (b.y - a.y);
                        const sq = (b.x - a.x)**2 + (b.y - a.y)**2;
                        if (dot >= 0 && dot <= sq) return false;
                    }
                }
                return true;
            };
            // ユニットエッジの中点が内部にあるか
            const e1 = getUnitEdges(p1.vertices);
            for (const e of e1) {
                const [x1, y1, x2, y2] = e.split(',').map(Number);
                if (isInsideStrictly({x:(x1+x2)/2, y:(y1+y2)/2}, p2.vertices)) return true;
            }
            return false;
        }

        function checkWinCondition() {
            if (gameState.polygons.length !== 2) return;
            const [p1, p2] = gameState.polygons;

            // 1. 重なりチェック
            if (checkOverlap(p1, p2) || checkOverlap(p2, p1)) {
                updateFeedback("図形が重なっています", true);
                return;
            }

            // 2. 接地面チェック
            const e1 = getUnitEdges(p1.vertices), e2 = getUnitEdges(p2.vertices);
            const shared = setIntersection(e1, getReversedEdges(e2));
            if (shared.size === 0) {
                updateFeedback("図形がはなれています");
                return;
            }

            // 3. 合体後の頂点数カウント（以前のロジック）
            const count = countCombinedVertices(e1, e2, shared);
            if (count === -1) {
                updateFeedback("図形が複雑すぎます", true);
            } else if (count === gameState.targetVertexCount) {
                showClearMessage();
            } else {
                updateFeedback(`形がちがいます（カドの数: ${count}個）`, true);
            }
        }

        function countCombinedVertices(e1, e2, shared) {
            const revShared = getReversedEdges(shared);
            const all = new Set([...e1, ...e2]);
            for (const s of shared) all.delete(s);
            for (const s of revShared) all.delete(s);
            if (all.size === 0) return 0;

            const map = new Map();
            for (const e of all) {
                const [x1, y1, x2, y2] = e.split(',').map(Number);
                map.set(`${x1},${y1}`, `${x2},${y2}`);
            }

            const start = all.values().next().value.split(',').slice(0, 2).join(',');
            let curr = start, path = [], safe = 0;
            while (true) {
                const [x, y] = curr.split(',').map(Number);
                path.push({x, y});
                curr = map.get(curr);
                if (!curr || curr === start) break;
                if (safe++ > all.size) return -1; 
            }
            if (path.length !== all.size) return -1; // 穴あきor複数島

            const corners = [];
            for (let i = 0; i < path.length; i++) {
                const p1 = path[(i + path.length - 1) % path.length], p2 = path[i], p3 = path[(i + 1) % path.length];
                if (Math.abs((p2.x - p1.x) * (p3.y - p2.y) - (p2.y - p1.y) * (p3.x - p2.x)) > 0.01) corners.push(p2);
            }
            return corners.length;
        }

        function updateFeedback(msg, isError = false) {
            feedbackEl.textContent = msg;
            feedbackEl.className = `text-sm font-medium p-2 rounded min-h-[3rem] flex items-center ${isError ? 'bg-red-50 text-red-600' : 'bg-slate-50 text-slate-500'}`;
        }

        function showClearMessage() {
            problems[gameState.problemId].isCleared = true;
            setupProblemSelect();
            updateFeedback("正解です！クリア！", false);
            messageTextEl.innerHTML = 'クリア！ 🎊';
            messageEl.classList.add('show');
            gameState.phase = 'cleared';
        }

        function setupProblemSelect() {
            problemSelectEl.innerHTML = '';
            problems.forEach((p, i) => {
                const opt = document.createElement('option');
                opt.value = i; opt.textContent = p.title + (p.isCleared ? ' ★' : '');
                problemSelectEl.appendChild(opt);
            });
            problemSelectEl.onchange = (e) => init(parseInt(e.target.value));
        }

        nextButton.onclick = () => init((gameState.problemId + 1) % problems.length);
        resetButton.onclick = () => init(gameState.problemId);
        window.onresize = resizeCanvas;

        setupProblemSelect();
        init();
    </script>
</body>
</html>
